services:
  backend-bot:
    container_name: backend-bot
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - type: bind
        source: ./db/backend_db.sqlite3
        target: /usr/src/app/backend_db.sqlite3
      - /var/lib/marzban/certs/:/usr/src/app/uvicorn/ssl
      - ./backend.yml:/usr/src/app/backend.yml
      - ./dig_data.json:/usr/src/app/dig_data.json
    ports:
       - '127.0.0.1:5001:5001'
    networks:
      - backend-network
    restart: unless-stopped
    tty: true
    stdin_open: true
networks:
  backend-network:
    name: backend-network
    driver: bridge
    external: true